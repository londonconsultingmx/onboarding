document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nk);\n    font-family: 'Manrope', sans-serif;\n    font-size: 28px;\n    line-height: 1.45;\n    overflow: hidden;\n  }\n\n  /* ——— frame & chrome ——— */\n  .frame {\n    position: absolute; inset: 0;\n    padding: 80px 100px;\n    display: flex; flex-direction: column;\n  }\n  .chrome-top, .chrome-bottom {\n    position: absolute; left: 100px; right: 100px;\n    display: flex; align-items: center; justify-content: space-between;\n    font-family: 'Manrope', sans-serif;\n    font-size: 14px; font-weight: 500;\n    text-transform: uppercase; letter-spacing: 0.14em;\n    color: var(--lcg-ink-60);\n  }\n  .chrome-top { top: 40px; }\n  .chrome-bottom { bottom: 40px; font-size: 13px; color: var(--lcg-ink-40); }\n  .chrome-top .emblem {\n    display: inline-flex; align-items: center; gap: 10px;\n    color: var(--lcg-dark);\n  }\n  .chrome-top .emblem img { height: 30px; width: auto; display: block; }\n  .chrome-top .emblem .dot {\n    width: 10px; height: 10px; border-radius: 999px; background: var(--lcg-green);\n  }\n  .chrome-top .emblem .word {\n    font-family: 'Fraunces', serif; font-weight: 300; font-size: 16px; letter-spacing: -0.01em; text-transform: none;\n  }\n  .chrome-top .emblem .word em { font-style: italic; color: var(--lcg-green); font-weight: 400; }\n  .dark .chrome-top .emblem img { filter: brightness(0) saturate(100%) invert(92%) sepia(4%) saturate(320%) hue-rotate(5deg) brightness(100%); }\n  .green-bg .chrome-top .emblem img { filter: brightness(0); }\n\n  /* ——— typography ——— */\n  .eyebrow {\n    font-family: 'Manrope', sans-serif;\n    font-size: 14px; font-weight: 600;\n    text-transform: uppercase; letter-spacing: 0.18em;\n    color: var(--lcg-green);\n  }\n  .kicker {\n    font-family: 'Manrope', sans-serif;\n    font-size: 16px; font-weight: 500;\n    text-transform: uppercase; letter-spacing: 0.14em;\n    color: var(--lcg-ink-60);\n  }\n  .h1 {\n    font-family: 'Fraunces', serif; font-weight: 300;\n    font-size: 148px; line-height: 0.98; letter-spacing: -0.03em;\n    color: var(--lcg-dark); margin: 0;\n  }\n  .h1 em { font-style: italic; color: var(--lcg-green); font-weight: 300; }\n  .h2 {\n    font-family: 'Fraunces', serif; font-weight: 300;\n    font-size: 96px; line-height: 1.02; letter-spacing: -0.03em;\n    color: var(--lcg-dark); margin: 0;\n  }\n  .h2 em { font-style: italic; color: var(--lcg-green); font-weight: 300; }\n  .h3 {\n    font-family: 'Fraunces', serif; font-weight: 300;\n    font-size: 64px; line-height: 1.05; letter-spacing: -0.025em;\n    color: var(--lcg-dark); margin: 0;\n  }\n  .h3 em { font-style: italic; color: var(--lcg-green); font-weight: 300; }\n  .body-lg { font-size: 32px; line-height: 1.4; color: var(--lcg-ink); font-weight: 300; }\n  .body { font-size: 28px; line-height: 1.45; color: var(--lcg-ink); font-weight: 400; }\n  .small { font-size: 22px; line-height: 1.5; color: var(--lcg-ink-60); font-weight: 400; }\n  .meta { font-size: 14px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--lcg-ink-60); font-weight: 500; }\n\n  .num-big {\n    font-family: 'Fraunces', serif; font-weight: 200;\n    font-size: 380px; line-height: 0.82; letter-spacing: -0.04em;\n    color: var(--lcg-green);\n  }\n\n  /* ——— building blocks ——— */\n  .pill {\n    display: inline-flex; align-items: center; gap: 10px;\n    height: 44px; padding: 0 22px;\n    border-radius: 999px;\n    font-family: 'Manrope', sans-serif;\n    font-size: 15px; font-weight: 600;\n    text-transform: uppercase; letter-spacing: 0.14em;\n    background: var(--lcg-green); color: var(--lcg-cream);\n  }\n  .pill.outline {\n    background: transparent; color: var(--lcg-dark);\n    border: 1px solid var(--lcg-line);\n  }\n  .pill.mint { background: var(--lcg-mint); color: var(--lcg-dark); }\n\n  .card {\n    background: transparent;\n    border: 1px solid var(--lcg-line);\n    border-radius: 4px;\n    padding: 40px 44px;\n  }\n\n  .divider-line { height: 1px; background: var(--lcg-line); width: 100%; }\n\n  .tbl { width: 100%; border-collapse: collapse; }\n  .tbl th {\n    text-align: left; padding: 18px 12px;\n    font-family: 'Manrope', sans-serif;\n    font-size: 14px; font-weight: 600;\n    text-transform: uppercase; letter-spacing: 0.14em;\n    color: var(--lcg-ink-60);\n    border-bottom: 1px solid var(--lcg-line);\n  }\n  .tbl td {\n    padding: 22px 12px;\n    font-family: 'Manrope', sans-serif;\n    font-size: 24px; color: var(--lcg-ink);\n    border-bottom: 1px solid var(--lcg-line);\n    vertical-align: top;\n  }\n  .tbl tr:last-child td { border-bottom: 0; }\n\n  /* ——— dark / cover-green ——— */\n  .dark { background: var(--lcg-dark) !important; color: var(--lcg-cream); }\n  .dark .h1, .dark .h2, .dark .h3 { color: var(--lcg-cream); }\n  .dark .h1 em, .dark .h2 em, .dark .h3 em { color: var(--lcg-mint); }\n  .dark .eyebrow { color: var(--lcg-mint); }\n  .dark .kicker, .dark .chrome-top, .dark .chrome-bottom, .dark .meta { color: rgba(242,238,232,0.62); }\n  .dark .body, .dark .body-lg { color: var(--lcg-cream); }\n  .dark .small { color: rgba(242,238,232,0.62); }\n  .dark .pill { background: var(--lcg-mint); color: var(--lcg-dark); }\n  .dark .pill.outline { background: transparent; color: var(--lcg-cream); border-color: var(--lcg-line-dark); }\n  .dark .card { border-color: var(--lcg-line-dark); }\n  .dark .tbl th, .dark .tbl td { border-color: var(--lcg-line-dark); }\n  .dark .tbl th { color: rgba(242,238,232,0.62); }\n  .dark .tbl td { color: var(--lcg-cream); }\n  .dark .divider-line { background: var(--lcg-line-dark); }\n  .dark .chrome-top .emblem { color: var(--lcg-cream); }\n  .dark .chrome-top .emblem .dot { background: var(--lcg-mint); }\n\n  .green-bg { background: var(--lcg-green) !important; color: var(--lcg-dark); }\n  .green-bg .h1, .green-bg .h2, .green-bg .h3 { color: var(--lcg-dark); }\n  .green-bg .h1 em, .green-bg .h2 em, .green-bg .h3 em { color: var(--lcg-cream); font-style: italic; }\n  .green-bg .eyebrow, .green-bg .kicker, .green-bg .chrome-top, .green-bg .chrome-bottom, .green-bg .meta { color: var(--lcg-dark); opacity: 0.72; }\n  .green-bg .chrome-top .emblem { color: var(--lcg-dark); }\n  .green-bg .chrome-top .emblem .dot { background: var(--lcg-dark); }\n  .green-bg .body { color: var(--lcg-dark); }\n  .green-bg .small { color: rgba(8,94,84,0.72); }\n\n  /* ——— grids ——— */\n  .grid-12 { display: grid; grid-template-columns: repeat(12, 1fr); column-gap: 24px; }\n  .grid-label { display: grid; grid-template-columns: 440px 1fr; column-gap: 60px; }\n\n  /* ——— utility ——— */\n  .stretch { flex: 1; }\n  .row { display: flex; }\n  .col { display: flex; flex-direction: column; }\n  .gap-sm { gap: 16px; }\n  .gap-md { gap: 28px; }\n  .gap-lg { gap: 44px; }\n  .gap-xl { gap: 72px; }\n  .mt-auto { margin-top: auto; }\n  .mb-auto { margin-bottom: auto; }\n  .between { justify-content: space-between; }\n  .center { align-items: center; }\n  .end { align-items: flex-end; }\n\n  /* ——— cover ——— */\n  .cover-grid {\n    position: absolute; inset: 0;\n    background-image:\n      linear-gradient(to right, var(--lcg-line) 1px, transparent 1px);\n    background-size: calc(100% / 12) 100%;\n    opacity: 0.55;\n    pointer-events: none;\n  }\n  .dark .cover-grid {\n    background-image: linear-gradient(to right, var(--lcg-line-dark) 1px, transparent 1px);\n  }\n\n  /* ——— quote ——— */\n  .quote-mark {\n    font-family: 'Fraunces', serif; font-weight: 300;\n    font-size: 240px; line-height: 0.6;\n    color: var(--lcg-green);\n  }\n\n  /* ——— section header big number ——— */\n  .section-num {\n    font-family: 'Fraunces', serif; font-weight: 200;\n    font-size: 500px; line-height: 0.82; letter-spacing: -0.04em;\n    color: var(--lcg-cream); opacity: 0.12;\n    position: absolute; right: 100px; top: 40%;\n    transform: translateY(-50%);\n    pointer-events: none;\n  }\n\n  /* ——— index entry ——— */\n  .idx-row {\n    display: grid; grid-template-columns: 80px 1fr auto;\n    padding: 28px 0;\n    border-bottom: 1px solid var(--lcg-line);\n    align-items: baseline;\n  }\n  .idx-num { font-family: 'Fraunces', serif; font-weight: 300; font-size: 32px; color: var(--lcg-green); }\n  .idx-title { font-family: 'Fraunces', serif; font-weight: 300; font-size: 40px; color: var(--lcg-dark); letter-spacing: -0.02em; }\n  .idx-sub { font-size: 18px; color: var(--lcg-ink-60); letter-spacing: 0.02em; }\n\n  /* dot list */\n  .ul-clean { list-style: none; padding: 0; margin: 0; }\n  .ul-clean li { padding: 14px 0; border-bottom: 1px solid var(--lcg-line); font-size: 24px; color: var(--lcg-ink); }\n  .ul-clean li:last-child { border-bottom: 0; }\n  .dark .ul-clean li { border-color: var(--lcg-line-dark); color: var(--lcg-cream); }\n\n  /* step flow */\n  .flow { display: flex; align-items: stretch; gap: 0; }\n  .flow .step {\n    flex: 1;\n    padding: 28px 24px;\n    border: 1px solid var(--lcg-line);\n    border-right: 0;\n    background: transparent;\n  }\n  .flow .step:last-child { border-right: 1px solid var(--lcg-line); }\n  .flow .step .n { font-family: 'Fraunces', serif; font-weight: 300; font-size: 28px; color: var(--lcg-green); }\n  .flow .step .t { font-size: 20px; font-weight: 600; color: var(--lcg-dark); margin-top: 8px; line-height: 1.2; }\n  .dark .flow .step { border-color: var(--lcg-line-dark); }\n\n  /* tag */\n  .tag {\n    display: inline-block;\n    font-size: 14px; font-weight: 500;\n    text-transform: uppercase; letter-spacing: 0.14em;\n    padding: 6px 14px;\n    border: 1px solid var(--lcg-line);\n    border-radius: 999px;\n    color: var(--lcg-ink-60);\n    margin-right: 8px; margin-bottom: 8px;\n  }\n  .dark .tag { border-color: var(--lcg-line-dark); color: rgba(242,238,232,0.7); }\n\n  /* portrait placeholder */\n  .portrait {\n    width: 140px; height: 140px; border-radius: 999px;\n    background: var(--lcg-dark);\n    display: flex; align-items: center; justify-content: center;\n    color: var(--lcg-mint);\n    font-family: 'Fraunces', serif; font-w \"num-big\" style=\"font-size: 80px;\">04<\u002Fdiv>\n        <div style=\"font-family: 'Fraunces', serif; font-weight: 300; font-size: 30px; color: var(--lcg-dark); margin-top: 8px; letter-spacing: -0.02em;\">Participa en grupos sociales<\u002Fdiv>\n        <div class=\"small\" style=\"margin-top: 12px;\">Asociaciones de padres, runners, congresos, charlas.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"grid-column: span 4;\">\n        <div class=\"num-big\" style=\"font-size: 80px;\">05<\u002Fdiv>\n        <div style=\"font-family: 'Fraunces', serif; font-weight: 300; font-size: 30px; color: var(--lcg-dark); margin-top: 8px; letter-spacing: -0.02em;\">Conversa con interés genuino<\u002Fdiv>\n        <div class=\"small\" style=\"margin-top: 12px;\">Escucha empática. Haz preguntas que muestren tu interés real por el tema.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"grid-column: span 4;\">\n        <div class=\"num-big\" style=\"font-size: 80px;\">06<\u002Fdiv>\n        <div style=\"font-family: 'Fraunces', serif; font-weight: 300; font-size: 30px; color: var(--lcg-dark); margin-top: 8px; letter-spacing: -0.02em;\">Elabora un calendario social<\u002Fdiv>\n        <div class=\"small\" style=\"margin-top: 12px;\">Identifica las fechas y eventos donde asistirán los perfiles que te interesan.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"chrome-bottom\">\n      <span>London Network · Tips<\u002Fspan>\n      <span>34 / 39<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========================= 26 · FULLNESS DIVIDER ========================= -->\n<section data-label=\"London Fullness\" class=\"dark\">\n  <div class=\"cover-grid\"><\u002Fdiv>\n  <div class=\"section-num\">06<\u002Fdiv>\n  <div class=\"frame\">\n    <div class=\"chrome-top\">\n      <span class=\"emblem\"><img src=\"de3b2ede-75cd-4856-a8cc-63ab870690ed\" alt=\"London Consulting Group\"><\u002Fspan>\n      <span>Sección 06<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"col stretch\" style=\"justify-content:flex-end; max-width: 1200px;\">\n      <div class=\"eyebrow\" style=\"margin-bottom: 40px;\">Capítulo 06<\u002Fdiv>\n      <h2 class=\"h2\" style=\"font-size: 140px;\">\n        London<br><em>Fullness<\u002Fem>.\n      <\u002Fh2>\n      <div class=\"body-lg\" style=\"margin-top: 48px; max-width: 760px; color: rgba(242,238,232,0.82);\">\n        Meditar para liderar. Cuerpo, inteligencia emocional y escucha empática.\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"chrome-bottom\">\n      <span>Sección · London Fullness<\u002Fspan>\n      <span>35 / 39<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========================= 27 · INTELIGENCIA EMOCIONAL ========================= -->\n<section data-label=\"Inteligencia emocional\">\n  <div class=\"frame\">\n    <div class=\"chrome-top\">\n      <span class=\"emblem\"><img src=\"de3b2ede-75cd-4856-a8cc-63ab870690ed\" alt=\"London Consulting Group\"><\u002Fspan>\n      <span>06 · London Fullness<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"grid-label\" style=\"margin-top: 60px;\">\n      <div>\n        <div class=\"eyebrow\" style=\"margin-bottom: 32px;\">Inteligencia emocional<\u002Fdiv>\n        <h2 class=\"h2\">Cinco<br>competencias<br>del<br><em>líder<\u002Fem>.<\u002Fh2>\n        <div class=\"small\" style=\"margin-top: 32px; max-width: 380px;\">\n          Los estudios recientes demuestran que los líderes con mejores resultados son los que manejan mejor sus emociones.\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"col gap-lg\" style=\"padding-top: 24px;\">\n        <div class=\"grid-12\" style=\"gap: 16px;\">\n          <div class=\"card\" style=\"grid-column: span 4;\"><div class=\"num-big\" style=\"font-size: 72px;\">01<\u002Fdiv><div style=\"font-family: 'Fraunces', serif; font-weight: 300; font-size: 34px; color: var(--lcg-dark); margin-top: 4px; letter-spacing: -0.02em;\">Autoconsciencia<\u002Fdiv><\u002Fdiv>\n          <div class=\"card\" style=\"grid-column: span 4;\"><div class=\"num-big\" style=\"font-size: 72px;\">02<\u002Fdiv><div style=\"font-family: 'Fraunces', serif; font-weight: 300; font-size: 34px; color: var(--lcg-dark); margin-top: 4px; letter-spacing: -0.02em;\">Autorregulación<\u002Fdiv><\u002Fdiv>\n          <div class=\"card\" style=\"grid-column: span 4;\"><div class=\"num-big\" style=\"font-size: 72px;\">03<\u002Fdiv><div style=\"font-family: 'Fraunces', serif; font-weight: 300; font-size: 34px; color: var(--lcg-dark); margin-top: 4px; letter-spacing: -0.02em;\">Motivación<\u002Fdiv><\u002Fdiv>\n          <div class=\"card\" style=\"grid-column: span 6;\"><div class=\"num-big\" style=\"font-size: 72px;\">04<\u002Fdiv><div style=\"font-family: 'Fraunces', serif; font-weight: 300; font-size: 34px; color: var(--lcg-dark); margin-top: 4px; letter-spacing: -0.02em;\">Empatía<\u002Fdiv><\u002Fdiv>\n          <div class=\"card\" style=\"grid-column: span 6;\"><div class=\"num-big\" style=\"font-size: 72px;\">05<\u002Fdiv><div style=\"font-family: 'Fraunces', serif; font-weight: 300; font-size: 34px; color: var(--lcg-dark); margin-top: 4px; letter-spacing: -0.02em;\">Habilidad social<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div>\n          <div class=\"meta\" style=\"margin-bottom: 20px;\">Por qué importa<\u002Fdiv>\n          <ul class=\"ul-clean\">\n            <li>Facilita la toma de mejores decisiones.<\u002Fli>\n            <li>Proyectamos mayor confianza ante los demás.<\u002Fli>\n            <li>Identificamos las expectativas de nuestros clientes.<\u002Fli>\n            <li>Administramos de forma más asertiva nuestras emociones.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"chrome-bottom\">\n      <span>London Fullness · Inteligencia emocional<\u002Fspan>\n      <span>36 / 39<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========================= 28 · ESCUCHA + CUERPO + GET READY ========================= -->\n<section data-label=\"Escucha empática y cuerpo\">\n  <div class=\"frame\">\n    <div class=\"chrome-top\">\n      <span class=\"emblem\"><img src=\"de3b2ede-75cd-4856-a8cc-63ab870690ed\" alt=\"London Consulting Group\"><\u002Fspan>\n      <span>06 · London Fullness<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"col\" style=\"margin-top: 60px;\">\n      <div class=\"eyebrow\" style=\"margin-bottom: 24px;\">Escucha empática · Cuerpo<\u002Fdiv>\n      <h2 class=\"h2\" style=\"max-width: 1200px;\">Dos prácticas, efecto <em>inmediato<\u002Fem>.<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"grid-12\" style=\"gap: 40px; margin-top: 56px;\">\n      <div style=\"grid-column: span 6;\">\n        <div class=\"meta\" style=\"color: var(--lcg-green); margin-bottom: 16px;\">01 · Escucha empática<\u002Fdiv>\n        <div style=\"font-family: 'Fraunces', serif; font-weight: 300; font-size: 38px; color: var(--lcg-dark); letter-spacing: -0.02em; line-height: 1.1;\">Comprender al otro de forma asertiva.<\u002Fdiv>\n        <ul class=\"ul-clean\" style=\"margin-top: 24px;\">\n          <li>Evita interrumpir cuando alguien habla.<\u002Fli>\n          <li>Mira a la persona cuando te dice algo.<\u002Fli>\n          <li>Presta atención a la postura corporal del interlocutor.<\u002Fli>\n          <li>Observa sus expresiones e identifica cómo se siente.<\u002Fli>\n          <li>Valida lo que has escuchado antes de responder.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div style=\"grid-column: span 6;\">\n        <div class=\"meta\" style=\"color: var(--lcg-green); margin-bottom: 16px;\">02 · Cuerpo<\u002Fdiv>\n        <div style=\"font-family: 'Fraunces', serif; font-weight: 300; font-size: 38px; color: var(--lcg-dark); letter-spacing: -0.02em; line-height: 1.1;\">La postura define la percepción.<\u002Fdiv>\n        <ul class=\"ul-clean\" style=\"margin-top: 24px;\">\n          <li>Postura erguida, camina rápido, mirada al frente.<\u002Fli>\n          <li>Evita hombros caídos o encorvarte.<\u002Fli>\n          <li>Antes de presentar: párate de la silla y saca las manos de los bolsillos.<\u002Fli>\n          <li>Ten la mirada al frente durante la reunión.<\u002Fli>\n          <li>Evita leer la presentación palabra por palabra.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"chrome-bottom\">\n      <span>London Fullness · Prácticas<\u002Fspan>\n      <span>37 / 39<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========================= 29 · GET READY (de la inducción) ========================= -->\n<section data-label=\"Get ready\">\n  <div class=\"frame\">\n    <div class=\"chrome-top\">\n      <span class=\"emblem\"><img src=\"de3b2ede-75cd-4856-a8cc-63ab870690ed\" alt=\"London Consulting Group\"><\u002Fspan>\n      <span>Sesión de inducción<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"col\" style=\"margin-top: 60px;\">\n      <div class=\"eyebrow\" style=\"margin-bottom: 24px;\">Lineamientos · Onboarding<\u002Fdiv>\n      <h2 class=\"h2\" style=\"max-width: 1200px;\">Get <em>ready<\u002Fem>.<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"grid-12\" style=\"gap: 28px; margin-top: 56px;\">\n      <div class=\"card\" style=\"grid-column: span 4;\">\n        <div class=\"meta\" style=\"color: var(--lcg-green);\">01 · Horarios<\u002Fdiv>\n        <ul class=\"ul-clean\" style=\"margin-top: 16px;\">\n          <li>Lunes a viernes · <strong>9–18 h (CST)<\u002Fstrong><\u002Fli>\n          <li>Breaks de <strong>20 min<\u002Fstrong><\u002Fli>\n          <li>Comida · <strong>14–15:30 h<\u002Fstrong><\u002Fli>\n          <li>Log in Teams con cuenta LCG<\u002Fli>\n          <li>Puntualidad y asistencia<\u002Fli>\n          <li>Video ON · Mic en silencio · Levanta la mano<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div class=\"card\" style=\"grid-column: span 4;\">\n        <div class=\"meta\" style=\"color: var(--lcg-green);\">02 · Código de vestimenta<\u002Fdiv>\n        <div style=\"font-family: 'Fraunces', serif; font-weight: 300; font-size: 48px; color: var(--lcg-dark); margin-top: 16px; letter-spacing: -0.02em; line-height: 1.05;\">Business <em style=\"font-style: italic; color: var(--lcg-green);\">casual<\u002Fem><\u002Fdiv>\n        <div class=\"small\" style=\"margin-top: 16px;\">\n          Formal el día de la presentación del proyecto final (JSA).\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card\" style=\"grid-column: span 4;\">\n        <div class=\"meta\" style=\"color: var(--lcg-green);\">03 · Actitud<\u002Fdiv>\n        <div class=\"small\" style=\"margin-top: 16px;\">\n          Esperamos participación activa, aporte de experiencias y alineación con nuestros valores:\n        <\u002Fdiv>\n        <div class=\"row\" style=\"flex-wrap: wrap; margin-top: 16px;\">\n          <span class=\"tag\">Bienestar integral<\u002Fspan>\n          <span class=\"tag\">Compromiso<\u002Fspan>\n          <span class=\"tag\">Innovación<\u002Fspan>\n          <span class=\"tag\">Integridad<\u002Fspan>\n          <span class=\"tag\">Orientación al cliente<\u002Fspan>\n          <span class=\"tag\">Pasión<\u002Fspan>\n          <span class=\"tag\">Respeto por el individuo<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"chrome-bottom\">\n      <span>Lineamientos · Sesión de inducción<\u002Fspan>\n      <span>38 / 39<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========================= 30 · CIERRE ========================= -->\n<section data-label=\"Bienvenido a México\" class=\"green-bg\">\n  <div class=\"frame\">\n    <div class=\"chrome-top\">\n      <span class=\"emblem\"><img src=\"de3b2ede-75cd-4856-a8cc-63ab870690ed\" alt=\"London Consulting Group\"><\u002Fspan>\n      <span>Cierre<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"col stretch center\" style=\"justify-content: center; text-align: center;\">\n      <div class=\"eyebrow\" style=\"color: var(--lcg-dark); opacity: 0.72; margin-bottom: 32px;\">Bienvenido<\u002Fdiv>\n      <h1 class=\"h1\" style=\"font-size: 220px; line-height: 0.92;\">a <em style=\"color: var(--lcg-cream); font-style: italic;\">México<\u002Fem>.<\u002Fh1>\n      <div class=\"body-lg\" style=\"margin-top: 48px; max-width: 720px; color: var(--lcg-dark);\">\n        Esperamos que este manual sea de utilidad para tu asignación. Nos vemos en la Región.\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"chrome-bottom\" style=\"color: var(--lcg-dark); opacity: 0.72;\">\n      <span>© London Consulting Group · Todos los derechos reservados<\u002Fspan>\n      <span>39 / 39<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fdeck-stage>\n\n<script src=\"04171acd-85ee-4e55-97da-16f789e0c0d2\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
