<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Guerrero Águila · Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,200..700;1,9..144,200..700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* Paleta "águila" — cálida, cobre/ámbar sobre crema cálida */
    --lcg-dark:#7A2E0E;      /* cobre profundo */
    --lcg-green:#D97706;     /* ámbar solar (acento) */
    --lcg-mint:#FCD5A8;      /* dorado claro */
    --lcg-cream:#F4EADD;     /* crema cálida */
    --lcg-ink:#1F140B;
    --lcg-ink-60:rgba(31,20,11,0.62);
    --lcg-line:rgba(122,46,14,0.22);
    --lcg-turq:#0E7C8A;      /* turquesa (contraste huichol) */
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--lcg-cream);color:var(--lcg-ink);font-family:'Manrope',sans-serif;}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}

  .stage{
    width:min(1100px,96vw);
    aspect-ratio: 1 / 1;
    background:var(--lcg-cream);
    border:1px solid var(--lcg-line);
    border-radius:6px;
    position:relative;
    overflow:hidden;
  }
  .chrome-top,.chrome-bottom{
    position:absolute; left:0; right:0;
    display:flex; justify-content:space-between; align-items:center;
    padding: 22px 28px;
    font-size:12px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--lcg-dark); font-weight:600;
    z-index: 6;
  }
  .chrome-top{ top:0;} .chrome-bottom{ bottom:0;}
  .chrome-bottom .meta{ color:var(--lcg-ink-60); font-weight:500;}
  .pill{border:1px solid var(--lcg-line); border-radius:999px; padding: 8px 18px; background: var(--lcg-cream);}
  .pill .dot{display:inline-block; width:6px; height:6px; background:var(--lcg-green); border-radius:999px; vertical-align: middle; margin-right: 8px; transform: translateY(-1px);}

  /* Fondo */
  .bg{
    position:absolute; inset: 60px 40px;
    z-index: 1;
    opacity: 0;
    animation: bgIn 1.4s .2s forwards ease-out;
  }
  .bg::before{
    content:""; position:absolute; inset:0;
    background-image:
      linear-gradient(to right, rgba(122,46,14,0.10) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(122,46,14,0.10) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 80%);
  }
  .bg::after{
    content:""; position:absolute; inset:0;
    background-image: radial-gradient(rgba(217,119,6,0.32) 1.3px, transparent 1.3px);
    background-size: 40px 40px;
    background-position: 20px 20px;
    mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 70%);
  }
  @keyframes bgIn{ to{ opacity:1;} }

  /* Anillos de pedestal — el águila gira la pupila más rápido y tiene más rayos */
  .ring{
    position:absolute;
    left:50%; top: 58%;
    width: 70%; aspect-ratio: 1/1;
    transform: translate(-50%,-50%);
    border-radius: 50%;
    border: 1px solid var(--lcg-line);
    z-index: 2;
    opacity: 0;
    animation: ringIn 1.2s .5s forwards ease-out;
  }
  .ring.r2{
    width: 55%;
    border-color: rgba(217,119,6,0.35);
    animation-delay: .7s;
  }
  .ring.r3{
    width: 40%;
    border: 1px dashed rgba(122,46,14,0.25);
    animation: ringIn 1.2s .9s forwards ease-out, spin 40s linear infinite 2s;
  }
  @keyframes ringIn{ to{ opacity:1;} }
  @keyframes spin{ to{ transform: translate(-50%,-50%) rotate(360deg);} }

  /* Rayos solares (únicos del águila) */
  .sunrays{
    position:absolute; left:50%; top:58%;
    width: 78%; aspect-ratio: 1/1;
    transform: translate(-50%,-50%);
    z-index: 2;
    opacity: 0;
    animation: ringIn 1.4s 1.0s forwards ease-out, spinSlow 120s linear infinite 2s;
    pointer-events: none;
  }
  .sunrays svg{ width:100%; height:100%; display:block; }
  @keyframes spinSlow{ to{ transform: translate(-50%,-50%) rotate(-360deg);} }

  /* Fig */
  .fig-wrap{
    position:absolute; inset: 0;
    display:flex; align-items:center; justify-content:center;
    z-index: 3;
  }
  .fig{
    width: 62%;
    max-width: 640px;
    filter: drop-shadow(0 30px 40px rgba(122,46,14,0.22));
    opacity: 0;
    transform: translateY(20px) scale(0.98);
    animation: figIn 1.4s 1.1s forwards cubic-bezier(.2,.7,.2,1), float 7s 2.5s ease-in-out infinite;
  }
  @keyframes figIn{
    to{ opacity:1; transform: translateY(0) scale(1);}
  }
  @keyframes float{
    0%, 100% { transform: translateY(0);}
    50%      { transform: translateY(-12px);}
  }

  .fig.masked{
    -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,1) var(--rev,100%), rgba(0,0,0,0) calc(var(--rev,100%) + 4%));
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,1) var(--rev,100%), rgba(0,0,0,0) calc(var(--rev,100%) + 4%));
  }

  /* Glow cálido (sol) */
  .glow{
    position:absolute; left:50%; top:48%;
    width: 55%; aspect-ratio:1/1;
    transform: translate(-50%,-50%);
    z-index: 2;
    background: radial-gradient(circle, rgba(217,119,6,0.38) 0%, rgba(217,119,6,0) 60%);
    opacity:0;
    animation: glowIn 1.2s 1.2s forwards ease-out, breathe 5s 2.6s ease-in-out infinite;
    filter: blur(10px);
  }
  @keyframes glowIn{ to{ opacity:1;} }
  @keyframes breathe{
    0%,100%{ opacity:1; transform: translate(-50%,-50%) scale(1);}
    50%    { opacity:0.55; transform: translate(-50%,-50%) scale(1.1);}
  }

  /* Label */
  .label{
    position:absolute;
    left: 48px; bottom: 78px;
    z-index: 5;
    max-width: 46%;
  }
  .label .eyebrow{
    font-size:12px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--lcg-ink-60); font-weight:600;
    margin-bottom: 10px;
    opacity:0; animation: riseIn .8s 1.9s forwards ease-out;
  }
  .label h1{
    font-family:'Fraunces',serif;
    font-weight: 300;
    font-size: clamp(40px, 5.2vw, 76px);
    line-height: 0.98;
    letter-spacing: -0.03em;
    color: var(--lcg-dark);
    margin: 0 0 12px;
    opacity:0; animation: riseIn 1s 2.05s forwards ease-out;
  }
  .label h1 em{ font-style: italic; font-weight: 300; color: var(--lcg-green);}
  .label p{
    font-family:'Manrope',sans-serif;
    font-size: 15px;
    line-height: 1.45;
    color: var(--lcg-ink-60);
    margin: 0;
    max-width: 340px;
    opacity:0; animation: riseIn 1s 2.25s forwards ease-out;
  }
  @keyframes riseIn{
    from{ opacity:0; transform: translateY(14px);}
    to  { opacity:1; transform: translateY(0);}
  }

  /* Coord markers */
  .coord{
    position:absolute;
    z-index: 5;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--lcg-dark);
    opacity: 0;
    animation: riseIn .9s 1.7s forwards ease-out;
  }
  .coord.tr{ top: 80px; right: 56px; text-align:right;}
  .coord .n{
    display:block;
    font-family:'Fraunces',serif; font-weight: 200; font-style: italic;
    font-size: 42px; line-height: 1; color: var(--lcg-green);
    letter-spacing: -0.02em;
    margin-top: 6px;
    text-transform: none;
  }

  /* Tick marks */
  .tick{
    position:absolute; z-index: 4;
    width: 14px; height: 14px;
    border-color: var(--lcg-dark);
    opacity: 0;
    animation: riseIn .8s 1.4s forwards ease-out;
  }
  .tick.tl{ top: 60px; left: 40px; border-top: 1px solid; border-left: 1px solid;}
  .tick.tr{ top: 60px; right: 40px; border-top: 1px solid; border-right: 1px solid;}
  .tick.bl{ bottom: 60px; left: 40px; border-bottom: 1px solid; border-left: 1px solid;}
  .tick.br{ bottom: 60px; right: 40px; border-bottom: 1px solid; border-right: 1px solid;}

  /* Placeholder de figura (mientras no hay imagen real) */
  .fig-placeholder{
    width: 62%;
    max-width: 640px;
    aspect-ratio: 540/960;
    position: relative;
    filter: drop-shadow(0 30px 40px rgba(122,46,14,0.22));
    opacity: 0;
    transform: translateY(20px) scale(0.98);
    animation: figIn 1.4s 1.1s forwards cubic-bezier(.2,.7,.2,1), float 7s 2.5s ease-in-out infinite;
  }
  .fig-placeholder svg{ width: 100%; height: 100%; display:block; }

  /* Tweaks */
  .tweaks{
    position:fixed; right:20px; bottom:20px; width:280px;
    background:var(--lcg-cream); border:1px solid var(--lcg-line); border-radius:6px;
    padding:16px 18px; z-index:50; display:none;
    box-shadow: 0 8px 24px rgba(122,46,14,0.12);
  }
  .tweaks.on{display:block;}
  .tweaks h3{margin:0 0 14px; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--lcg-dark); font-weight:700;}
  .tweaks label{display:flex; justify-content:space-between; font-size:12px; color:var(--lcg-ink-60); margin-bottom:6px; font-weight:500;}
  .tweaks .row{margin-bottom:12px;}
  .tweaks .seg{display:flex; border:1px solid var(--lcg-line); border-radius:4px; overflow:hidden;}
  .tweaks .seg button{flex:1; border:0; border-right:1px solid var(--lcg-line); background:var(--lcg-cream); color:var(--lcg-ink); font-family:'Manrope',sans-serif; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; font-weight:600; padding:8px 10px; cursor:pointer;}
  .tweaks .seg button:last-child{border-right:0;}
  .tweaks .seg button.active{background:var(--lcg-dark); color:var(--lcg-cream);}
  .tweaks .btns{display:flex; gap:8px; margin-top:6px;}
  .tweaks .btns button{flex:1; border:1px solid var(--lcg-line); background:var(--lcg-cream); color:var(--lcg-ink); font-family:'Manrope',sans-serif; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; font-weight:600; padding:8px 10px; border-radius:4px; cursor:pointer;}

  .bg.dots-only::before{ display:none; }
  .bg.grid-only::after{ display:none; }
</style>
</head>
<body>

<div class="stage" id="stage">

  <div class="chrome-top">
    <div>ANI‑003 · FIG/GUERRERO</div>
    <div class="pill"><span class="dot"></span>Portal · Bienvenida</div>
  </div>

  <span class="tick tl"></span>
  <span class="tick tr"></span>
  <span class="tick bl"></span>
  <span class="tick br"></span>

  <div class="coord tr">
    Pieza
    <span class="n">№ 02</span>
  </div>

  <div class="bg grid-only"></div>
  <div class="glow"></div>

  <!-- Rayos solares adicionales (marca del águila) -->
  <div class="sunrays" aria-hidden="true">
    <svg viewBox="-100 -100 200 200">
      <g fill="none" stroke="rgba(217,119,6,0.35)" stroke-width="0.5">
        <!-- 24 rayos -->
        <g id="rayg"></g>
      </g>
    </svg>
  </div>

  <div class="ring"></div>
  <div class="ring r2"></div>
  <div class="ring r3"></div>

  <div class="fig-wrap">
    <img src="assets/eagle-half.png" alt="Guerrero Águila" class="fig masked" id="fig">
  </div>
  <div class="fig-wrap" style="display:none">
    <!-- Placeholder SVG (desactivado ahora que tenemos imagen real) -->
    <div class="fig-placeholder masked" id="fig">
      <svg viewBox="0 0 540 960" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="chaquira" patternUnits="userSpaceOnUse" width="14" height="14">
            <rect width="14" height="14" fill="#7A2E0E"/>
            <circle cx="7" cy="7" r="2.2" fill="#D97706"/>
            <circle cx="0" cy="0" r="1.2" fill="#F4B860"/>
            <circle cx="14" cy="0" r="1.2" fill="#F4B860"/>
            <circle cx="0" cy="14" r="1.2" fill="#F4B860"/>
            <circle cx="14" cy="14" r="1.2" fill="#F4B860"/>
            <circle cx="3.5" cy="10.5" r="0.8" fill="#0E7C8A"/>
            <circle cx="10.5" cy="3.5" r="0.8" fill="#0E7C8A"/>
          </pattern>
          <pattern id="chaquira2" patternUnits="userSpaceOnUse" width="10" height="10">
            <rect width="10" height="10" fill="#0E7C8A"/>
            <circle cx="5" cy="5" r="1.6" fill="#F4B860"/>
            <circle cx="0" cy="0" r="1" fill="#D97706"/>
            <circle cx="10" cy="10" r="1" fill="#D97706"/>
          </pattern>
          <pattern id="chaquira3" patternUnits="userSpaceOnUse" width="12" height="12">
            <rect width="12" height="12" fill="#D97706"/>
            <circle cx="6" cy="6" r="2" fill="#7A2E0E"/>
            <circle cx="0" cy="6" r="1.1" fill="#F4EADD"/>
            <circle cx="12" cy="6" r="1.1" fill="#F4EADD"/>
          </pattern>
          <linearGradient id="feather" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#D97706"/>
            <stop offset="45%" stop-color="#C2410C"/>
            <stop offset="100%" stop-color="#7A2E0E"/>
          </linearGradient>
          <linearGradient id="featherAccent" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FCD5A8"/>
            <stop offset="100%" stop-color="#D97706"/>
          </linearGradient>
          <radialGradient id="sunshield" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FCD5A8"/>
            <stop offset="60%" stop-color="#D97706"/>
            <stop offset="100%" stop-color="#7A2E0E"/>
          </radialGradient>
        </defs>

        <!-- Base / pedestal -->
        <ellipse cx="270" cy="920" rx="170" ry="22" fill="#5A2209"/>
        <ellipse cx="270" cy="912" rx="170" ry="22" fill="#7A2E0E"/>
        <ellipse cx="270" cy="912" rx="170" ry="22" fill="url(#chaquira)" opacity="0.85"/>

        <!-- Alas izquierda -->
        <g transform="translate(270,330)">
          <g id="wingL">
            <!-- plumas largas -->
            <path d="M 0 0 Q -140 -40 -230 -180 Q -180 -120 -60 -40 Z" fill="url(#feather)"/>
            <path d="M 0 0 Q -120 -20 -200 -140 Q -160 -90 -50 -20 Z" fill="url(#featherAccent)" opacity="0.85"/>
            <path d="M 0 0 Q -110 0 -180 -100 Q -140 -60 -40 0 Z" fill="#C2410C"/>
            <!-- detalle nervaduras -->
            <g stroke="#F4EADD" stroke-width="1" fill="none" opacity="0.5">
              <path d="M -20 -10 Q -90 -50 -170 -130"/>
              <path d="M -20 -5 Q -80 -30 -150 -100"/>
              <path d="M -20 0 Q -70 -10 -130 -70"/>
            </g>
          </g>
          <!-- ala derecha (espejo) -->
          <use href="#wingL" transform="scale(-1,1)"/>
        </g>

        <!-- Cabeza de águila -->
        <g transform="translate(270,230)">
          <!-- tocado de plumas (penacho) -->
          <g>
            <path d="M -80 -20 Q -95 -90 -40 -110 Q -50 -60 -30 -20 Z" fill="url(#feather)"/>
            <path d="M -40 -30 Q -50 -110 10 -130 Q -10 -75 5 -25 Z" fill="url(#featherAccent)"/>
            <path d="M 0 -35 Q 0 -130 55 -120 Q 30 -70 30 -30 Z" fill="url(#feather)"/>
            <path d="M 40 -30 Q 60 -110 90 -90 Q 70 -55 60 -20 Z" fill="url(#featherAccent)"/>
          </g>
          <!-- cráneo -->
          <ellipse cx="0" cy="5" rx="70" ry="70" fill="#7A2E0E"/>
          <ellipse cx="0" cy="5" rx="70" ry="70" fill="url(#chaquira)" opacity="0.9"/>
          <!-- pico -->
          <path d="M -15 25 Q 0 80 25 40 Q 15 30 -15 25 Z" fill="#FCD5A8" stroke="#5A2209" stroke-width="1.5"/>
          <path d="M -10 35 Q 0 55 18 42 Z" fill="#7A2E0E"/>
          <!-- ojo -->
          <circle cx="-25" cy="-5" r="10" fill="#F4EADD"/>
          <circle cx="-22" cy="-3" r="5" fill="#1F140B"/>
          <circle cx="-20" cy="-5" r="1.5" fill="#F4EADD"/>
          <!-- marcas faciales huichol -->
          <g stroke="#0E7C8A" stroke-width="1.5" fill="none" opacity="0.7">
            <path d="M 20 -20 Q 40 -10 50 10"/>
            <path d="M 15 -10 Q 35 0 42 18"/>
          </g>
          <!-- pequeñas cuentas de color -->
          <circle cx="-45" cy="30" r="3" fill="#D97706"/>
          <circle cx="-35" cy="45" r="3" fill="#0E7C8A"/>
          <circle cx="40" cy="-15" r="3" fill="#F4B860"/>
          <circle cx="50" cy="0" r="3" fill="#0E7C8A"/>
        </g>

        <!-- Cuerpo / torso -->
        <g>
          <!-- torso base -->
          <path d="M 170 320 Q 155 400 165 500 Q 175 580 200 620 L 340 620 Q 365 580 375 500 Q 385 400 370 320 Q 340 300 270 305 Q 200 300 170 320 Z" fill="#7A2E0E"/>
          <path d="M 170 320 Q 155 400 165 500 Q 175 580 200 620 L 340 620 Q 365 580 375 500 Q 385 400 370 320 Q 340 300 270 305 Q 200 300 170 320 Z" fill="url(#chaquira)" opacity="0.92"/>
          <!-- medallón solar -->
          <circle cx="270" cy="400" r="34" fill="url(#sunshield)" stroke="#5A2209" stroke-width="2"/>
          <circle cx="270" cy="400" r="22" fill="none" stroke="#5A2209" stroke-width="1"/>
          <g stroke="#5A2209" stroke-width="1" fill="none">
            <line x1="270" y1="370" x2="270" y2="378"/>
            <line x1="270" y1="422" x2="270" y2="430"/>
            <line x1="240" y1="400" x2="248" y2="400"/>
            <line x1="292" y1="400" x2="300" y2="400"/>
          </g>
          <!-- patrones -->
          <g fill="url(#chaquira2)" opacity="0.9">
            <rect x="185" y="440" width="45" height="50" rx="8"/>
            <rect x="310" y="440" width="45" height="50" rx="8"/>
            <rect x="245" y="495" width="50" height="45" rx="8"/>
          </g>
          <g fill="url(#chaquira3)" opacity="0.85">
            <rect x="190" y="500" width="40" height="45" rx="8"/>
            <rect x="310" y="500" width="40" height="45" rx="8"/>
          </g>
        </g>

        <!-- Brazos -->
        <g>
          <path d="M 170 325 Q 100 360 85 460 Q 80 540 120 580 Q 150 555 145 480 Q 155 400 180 360 Z" fill="#7A2E0E"/>
          <path d="M 170 325 Q 100 360 85 460 Q 80 540 120 580 Q 150 555 145 480 Q 155 400 180 360 Z" fill="url(#chaquira)" opacity="0.9"/>
          <path d="M 370 325 Q 440 360 455 460 Q 460 540 420 580 Q 390 555 395 480 Q 385 400 360 360 Z" fill="#7A2E0E"/>
          <path d="M 370 325 Q 440 360 455 460 Q 460 540 420 580 Q 390 555 395 480 Q 385 400 360 360 Z" fill="url(#chaquira)" opacity="0.9"/>
          <!-- garras -->
          <g fill="#FCD5A8" stroke="#5A2209" stroke-width="1.2">
            <path d="M 115 585 Q 105 605 115 620 Q 122 608 122 590 Z"/>
            <path d="M 125 588 Q 118 610 128 622 Q 135 610 133 592 Z"/>
            <path d="M 415 585 Q 425 605 415 620 Q 408 608 408 590 Z"/>
            <path d="M 425 588 Q 432 610 422 622 Q 415 610 417 592 Z"/>
          </g>
        </g>

        <!-- Escudo solar -->
        <g transform="translate(405,470)">
          <circle r="78" fill="url(#sunshield)" stroke="#5A2209" stroke-width="2.5"/>
          <circle r="62" fill="none" stroke="#5A2209" stroke-width="1.2" stroke-dasharray="3 3"/>
          <circle r="40" fill="none" stroke="#5A2209" stroke-width="1.5"/>
          <!-- glifo central -->
          <circle r="22" fill="#C2410C"/>
          <g stroke="#F4EADD" stroke-width="1.3" fill="none">
            <circle r="12"/>
            <path d="M -8 -4 L 8 -4"/>
            <path d="M -8 4 L 8 4"/>
            <circle cx="-4" cy="-2" r="1.5" fill="#F4EADD"/>
            <circle cx="4" cy="-2" r="1.5" fill="#F4EADD"/>
          </g>
          <!-- rayos dentro del escudo -->
          <g stroke="#5A2209" stroke-width="1.2" fill="none">
            <line x1="0" y1="-62" x2="0" y2="-50"/>
            <line x1="0" y1="62" x2="0" y2="50"/>
            <line x1="-62" y1="0" x2="-50" y2="0"/>
            <line x1="62" y1="0" x2="50" y2="0"/>
            <line x1="-44" y1="-44" x2="-36" y2="-36"/>
            <line x1="44" y1="-44" x2="36" y2="-36"/>
            <line x1="-44" y1="44" x2="-36" y2="36"/>
            <line x1="44" y1="44" x2="36" y2="36"/>
          </g>
        </g>

        <!-- Taparrabos / manta -->
        <g>
          <path d="M 195 615 L 345 615 Q 355 680 340 760 L 200 760 Q 185 680 195 615 Z" fill="#F4EADD" stroke="#C2410C" stroke-width="1.5"/>
          <path d="M 255 760 L 285 760 L 275 810 L 265 810 Z" fill="#F4EADD" stroke="#C2410C" stroke-width="1.5"/>
          <!-- medallón del cinturón -->
          <circle cx="270" cy="620" r="20" fill="url(#sunshield)" stroke="#5A2209" stroke-width="1.5"/>
          <!-- franjas laterales -->
          <g fill="url(#chaquira3)" opacity="0.75">
            <rect x="195" y="615" width="20" height="145" rx="3"/>
            <rect x="325" y="615" width="20" height="145" rx="3"/>
          </g>
          <!-- flecos dorados -->
          <g stroke="#D97706" stroke-width="2">
            <line x1="205" y1="760" x2="205" y2="780"/>
            <line x1="215" y1="760" x2="215" y2="785"/>

<div class="tweaks" id="tweaks">
  <h3>Tweaks</h3>

  <div class="row">
    <label>Flotación <span id="flv">On</span></label>
    <div class="seg" id="floatSeg">
      <button data-v="on" class="active">On</button>
      <button data-v="off">Off</button>
    </div>
  </div>

  <div class="row">
    <label>Glow solar</label>
    <div class="seg" id="glowSeg">
      <button data-v="on" class="active">On</button>
      <button data-v="off">Off</button>
    </div>
  </div>

  <div class="row">
    <label>Rayos</label>
    <div class="seg" id="raysSeg">
      <button data-v="on" class="active">On</button>
      <button data-v="off">Off</button>
    </div>
  </div>

  <div class="row">
    <label>Fondo</label>
    <div class="seg" id="bgSeg">
      <button data-v="grid" class="active">Grid</button>
      <button data-v="dots">Puntos</button>
      <button data-v="none">Limpio</button>
    </div>
  </div>

  <div class="btns">
    <button id="replay">Replay</button>
  </div>
</div>

<script>
const TWEAKS = /*EDITMODE-BEGIN*/{
  "float": "on",
  "glow": "on",
  "rays": "on",
  "bg": "grid"
}/*EDITMODE-END*/;

const fig = document.getElementById('fig');
const bg  = document.querySelector('.bg');
const glow= document.querySelector('.glow');
const rays= document.querySelector('.sunrays');

// Construir rayos SVG
(function(){
  const g = rays.querySelector('#rayg');
  if (!g) return;
  const N = 36;
  for (let i=0;i<N;i++){
    const a = (i/N) * Math.PI * 2;
    const x1 = Math.cos(a)*70, y1 = Math.sin(a)*70;
    const x2 = Math.cos(a)*95, y2 = Math.sin(a)*95;
    const ln = document.createElementNS('http://www.w3.org/2000/svg','line');
    ln.setAttribute('x1',x1.toFixed(2)); ln.setAttribute('y1',y1.toFixed(2));
    ln.setAttribute('x2',x2.toFixed(2)); ln.setAttribute('y2',y2.toFixed(2));
    g.appendChild(ln);
  }
})();

function animateReveal(){
  fig.style.setProperty('--rev', '0%');
  fig.classList.add('masked');
  const start = performance.now();
  const dur = 1400;
  const delay = 1100;
  function tick(t){
    const el = t - start;
    if (el < delay){ requestAnimationFrame(tick); return; }
    const p = Math.min(1, (el - delay) / dur);
    const e = 1 - Math.pow(1 - p, 3);
    fig.style.setProperty('--rev', (e * 100) + '%');
    if (p < 1) requestAnimationFrame(tick);
    else fig.classList.remove('masked');
  }
  requestAnimationFrame(tick);
}
animateReveal();

function applyTweaks(){
  fig.style.animation = TWEAKS.float === 'on'
    ? 'figIn 1.4s 1.1s forwards cubic-bezier(.2,.7,.2,1), float 7s 2.5s ease-in-out infinite'
    : 'figIn 1.4s 1.1s forwards cubic-bezier(.2,.7,.2,1)';

  glow.style.display = TWEAKS.glow === 'on' ? '' : 'none';
  rays.style.display = TWEAKS.rays === 'on' ? '' : 'none';

  bg.style.display = TWEAKS.bg === 'none' ? 'none' : '';
  bg.classList.toggle('dots-only', TWEAKS.bg === 'dots');
  bg.classList.toggle('grid-only', TWEAKS.bg === 'grid');
}
applyTweaks();

function wireSeg(segId, key){
  const seg = document.getElementById(segId);
  seg.querySelectorAll('button').forEach(b => {
    if (b.dataset.v === TWEAKS[key]) b.classList.add('active');
    else b.classList.remove('active');
    b.addEventListener('click', () => {
      seg.querySelectorAll('button').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      TWEAKS[key] = b.dataset.v;
      window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[key]: TWEAKS[key]}}, '*');
      applyTweaks();
    });
  });
}
wireSeg('floatSeg','float');
wireSeg('glowSeg','glow');
wireSeg('raysSeg','rays');
wireSeg('bgSeg','bg');

document.getElementById('replay').addEventListener('click', () => {
  fig.style.animation = 'none'; fig.offsetHeight;
  applyTweaks();
  animateReveal();
});

window.addEventListener('message', (e) => {
  const d = e.data || {};
  if (d.type === '__activate_edit_mode') document.getElementById('tweaks').classList.add('on');
  if (d.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('on');
});
window.parent.postMessage({type:'__edit_mode_available'}, '*');
</script>

</body>
