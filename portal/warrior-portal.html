<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Guerrero · Bienvenida · Día 01</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,200..400;1,9..144,300..400&family=Manrope:wght@400;500;600;700&display=swap">
<style>
  :root{
    --lcg-dark:#085E54;
    --lcg-green:#03B585;
    --lcg-mint:#8AF4E9;
    --lcg-cream:#F2EEE8;
    --lcg-ink:#1A1E1B;
    --lcg-ink-60:rgba(26,30,27,0.62);
    --lcg-line:rgba(8,94,84,0.18);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--lcg-cream);color:var(--lcg-ink);font-family:'Manrope',sans-serif;}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:0;}

  .stage{
    width:100%;
    height:100vh;
    max-height:100vw;
    aspect-ratio: 1 / 1;
    background:var(--lcg-cream);
    position:relative;
    overflow:hidden;
  }
  .chrome-top,.chrome-bottom{
    position:absolute; left:0; right:0;
    display:flex; justify-content:space-between; align-items:center;
    padding: 22px 28px;
    font-size:12px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--lcg-dark); font-weight:600;
    z-index: 6;
  }
  .chrome-top{ top:0;} .chrome-bottom{ bottom:0;}
  .chrome-bottom .meta{ color:var(--lcg-ink-60); font-weight:500;}
  .pill{border:1px solid var(--lcg-line); border-radius:999px; padding: 8px 18px; background: var(--lcg-cream);}
  .pill .dot{display:inline-block; width:6px; height:6px; background:var(--lcg-green); border-radius:999px; vertical-align: middle; margin-right: 8px; transform: translateY(-1px);}

  /* ---- Fondo grid ---- */
  .bg{
    position:absolute; inset: 60px 40px;
    z-index: 1;
    opacity: 0;
    animation: bgIn 1.4s .2s forwards ease-out;
  }
  .bg::before{
    content:""; position:absolute; inset:0;
    background-image:
      linear-gradient(to right, rgba(8,94,84,0.10) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(8,94,84,0.10) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 80%);
  }
  .bg::after{
    content:""; position:absolute; inset:0;
    background-image: radial-gradient(rgba(3,181,133,0.32) 1.3px, transparent 1.3px);
    background-size: 40px 40px;
    background-position: 20px 20px;
    mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 70%);
  }
  @keyframes bgIn{ to{ opacity:1;} }

  /* ---- Pedestal ring ---- */
  .ring{
    position:absolute;
    left:50%; top: 58%;
    width: 70%; aspect-ratio: 1/1;
    transform: translate(-50%,-50%);
    border-radius: 50%;
    border: 1px solid var(--lcg-line);
    z-index: 2;
    opacity: 0;
    animation: ringIn 1.2s .5s forwards ease-out;
  }
  .ring.r2{
    width: 55%;
    border-color: rgba(3,181,133,0.35);
    animation-delay: .7s;
  }
  .ring.r3{
    width: 40%;
    border: 1px dashed rgba(8,94,84,0.25);
    animation: ringIn 1.2s .9s forwards ease-out, spin 40s linear infinite 2s;
  }
  @keyframes ringIn{ to{ opacity:1;} }
  @keyframes spin{ to{ transform: translate(-50%,-50%) rotate(360deg);} }

  /* ---- Fig ---- */
  .fig-wrap{
    position:absolute; inset: 0;
    display:flex; align-items:center; justify-content:center;
    z-index: 3;
  }
  .fig{
    width: 58%;
    max-width: 620px;
    filter: drop-shadow(0 30px 40px rgba(8,94,84,0.18));
    opacity: 0;
    transform: translateY(20px) scale(0.98);
    animation: figIn 1.4s 1.1s forwards cubic-bezier(.2,.7,.2,1), float 7s 2.5s ease-in-out infinite;
  }
  @keyframes figIn{
    to{ opacity:1; transform: translateY(0) scale(1);}
  }
  @keyframes float{
    0%, 100% { transform: translateY(0);}
    50%      { transform: translateY(-10px);}
  }

  /* Reveal mask: the fig appears wiping up */
  .fig.masked{
    -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,1) var(--rev,100%), rgba(0,0,0,0) calc(var(--rev,100%) + 4%));
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,1) var(--rev,100%), rgba(0,0,0,0) calc(var(--rev,100%) + 4%));
  }

  /* Glow pulse behind */
  .glow{
    position:absolute; left:50%; top:48%;
    width: 50%; aspect-ratio:1/1;
    transform: translate(-50%,-50%);
    z-index: 2;
    background: radial-gradient(circle, rgba(3,181,133,0.35) 0%, rgba(3,181,133,0) 60%);
    opacity:0;
    animation: glowIn 1.2s 1.2s forwards ease-out, breathe 5s 2.6s ease-in-out infinite;
    filter: blur(8px);
  }
  @keyframes glowIn{ to{ opacity:1;} }
  @keyframes breathe{
    0%,100%{ opacity:1; transform: translate(-50%,-50%) scale(1);}
    50%    { opacity:0.55; transform: translate(-50%,-50%) scale(1.08);}
  }

  /* ---- Label block ---- */
  .label{
    position:absolute;
    left: 48px; bottom: 78px;
    z-index: 5;
    max-width: 46%;
  }
  .label .eyebrow{
    font-size:12px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--lcg-ink-60); font-weight:600;
    margin-bottom: 10px;
    opacity:0; animation: riseIn .8s 1.9s forwards ease-out;
  }
  .label h1{
    font-family:'Fraunces',serif;
    font-weight: 300;
    font-size: clamp(32px, 4.4vw, 56px);
    line-height: 0.98;
    letter-spacing: -0.03em;
    color: var(--lcg-dark);
    margin: 0 0 12px;
    opacity:0; animation: riseIn 1s 2.05s forwards ease-out;
  }
  .label h1 em{ font-style: italic; font-weight: 300; color: var(--lcg-green);}
  .label p{
    font-family:'Manrope',sans-serif;
    font-size: 13.5px;
    line-height: 1.45;
    color: var(--lcg-ink-60);
    margin: 0;
    max-width: 320px;
    opacity:0; animation: riseIn 1s 2.25s forwards ease-out;
  }
  @keyframes riseIn{
    from{ opacity:0; transform: translateY(14px);}
    to  { opacity:1; transform: translateY(0);}
  }

  /* ---- Coord markers ---- */
  .coord{
    position:absolute;
    z-index: 5;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--lcg-dark);
    opacity: 0;
    animation: riseIn .9s 1.7s forwards ease-out;
  }
  .coord.tr{ top: 80px; right: 56px; text-align:right;}
  .coord .n{
    display:block;
    font-family:'Fraunces',serif; font-weight: 200; font-style: italic;
    font-size: 36px; line-height: 1; color: var(--lcg-green);
    letter-spacing: -0.02em;
    margin-top: 6px;
    text-transform: none;
  }

  /* ---- Tick marks decorativos en las esquinas ---- */
  .tick{
    position:absolute; z-index: 4;
    width: 14px; height: 14px;
    border-color: var(--lcg-dark);
    opacity: 0;
    animation: riseIn .8s 1.4s forwards ease-out;
  }
  .tick.tl{ top: 60px; left: 40px; border-top: 1px solid; border-left: 1px solid;}
  .tick.tr{ top: 60px; right: 40px; border-top: 1px solid; border-right: 1px solid;}
  .tick.bl{ bottom: 60px; left: 40px; border-bottom: 1px solid; border-left: 1px solid;}
  .tick.br{ bottom: 60px; right: 40px; border-bottom: 1px solid; border-right: 1px solid;}
</style>
</head>
<body>

<div class="stage" id="stage">

  <div class="chrome-top">
    <div>FIG‑100 · IDE/HELLO</div>
    <div class="pill"><span class="dot"></span>Portal · Bienvenida</div>
  </div>

  <span class="tick tl"></span>
  <span class="tick tr"></span>
  <span class="tick bl"></span>
  <span class="tick br"></span>

  <div class="coord tr">
    Pieza
    <span class="n">№ 01</span>
  </div>

  <div class="bg"></div>
  <div class="glow"></div>
  <div class="ring"></div>
  <div class="ring r2"></div>
  <div class="ring r3"></div>

  <div class="fig-wrap">
    <img src="assets/guerrero.png" alt="Guerrero huichol" class="fig" id="fig" width="702" height="763">
  </div>

  <div class="label">
    <div class="eyebrow">Arte popular · Huichol</div>
    <h1>Guerrero<br><em>jaguar.</em></h1>
    <p>Figura ceremonial con chaquira, alas policromadas y escudo solar. Bienvenida al portal de onboarding LCG.</p>
  </div>

  <div class="chrome-bottom">
    <div>FIG · HUICHOL</div>
    <div class="meta">LCG.HELLO</div>
  </div>
</div>

<script>
  const fig = document.getElementById('fig');
  const supportsMask =
    CSS && CSS.supports &&
    (CSS.supports('mask-image', 'linear-gradient(black, black)') ||
     CSS.supports('-webkit-mask-image', 'linear-gradient(black, black)'));

  function animateReveal(){
    if (!supportsMask) return;
    fig.style.setProperty('--rev', '0%');
    fig.classList.add('masked');
    const start = performance.now();
    const dur = 1400;
    const delay = 1100;
    let done = false;
    function finish(){
      if (done) return;
      done = true;
      fig.classList.remove('masked');
      fig.style.removeProperty('--rev');
    }
    function tick(t){
      const el = t - start;
      if (el < delay){ requestAnimationFrame(tick); return; }
      const p = Math.min(1, (el - delay) / dur);
      const e = 1 - Math.pow(1 - p, 3);
      fig.style.setProperty('--rev', (e * 100) + '%');
      if (p < 1) requestAnimationFrame(tick);
      else finish();
    }
    requestAnimationFrame(tick);
    setTimeout(finish, 3000);
  }

  if (fig.complete && fig.naturalWidth > 0) animateReveal();
  else fig.addEventListener('load', animateReveal, { once: true });
</script>
</body>
</html>
