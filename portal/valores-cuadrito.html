<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Cuadrito · Valores · Variante A</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --lcg-dark:   #085E54;
    --lcg-green:  #03B585;
    --lcg-mint:   #8AF4E9;
    --lcg-cream:  #F2EEE8;
    --lcg-ink:    #1A1E1B;
    --lcg-ink-60: rgba(26,30,27,0.62);
    --lcg-ink-40: rgba(26,30,27,0.42);
    --lcg-line:   rgba(8,94,84,0.18);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: transparent;
    font-family: 'Manrope', sans-serif;
    color: var(--lcg-ink);
    min-height: 100vh;
    display: grid; place-items: center;
  }

  .wrap {
    display: flex; flex-direction: column; gap: 14px;
    align-items: center;
    width: min(560px, calc(100% - 24px));
    padding: 12px 0;
  }

  .label {
    display: flex; align-items: center; gap: 12px;
    width: 100%;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.16em; color: var(--lcg-ink-60);
  }
  .label .bar { flex: 1; height: 1px; background: var(--lcg-line); }

  .sq {
    width: 100%;
    aspect-ratio: 1 / 1;
    position: relative;
    overflow: hidden;
    border-radius: 6px;
    background: var(--lcg-cream);
    color: var(--lcg-dark);
    border: 1px solid var(--lcg-line);
  }
  .corner { position: absolute; width: 14px; height: 14px; z-index: 4; color: var(--lcg-ink-60); }
  .corner.tl { top: 0; left: 0; border-top: 1px solid currentColor; border-left: 1px solid currentColor; }
  .corner.tr { top: 0; right: 0; border-top: 1px solid currentColor; border-right: 1px solid currentColor; }
  .corner.bl { bottom: 0; left: 0; border-bottom: 1px solid currentColor; border-left: 1px solid currentColor; }
  .corner.br { bottom: 0; right: 0; border-bottom: 1px solid currentColor; border-right: 1px solid currentColor; }

  .sq .bg {
    position: absolute; inset: 0;
    background-image: linear-gradient(to right, var(--lcg-line) 1px, transparent 1px);
    background-size: calc(100% / 6) 100%;
    opacity: 0.4;
    pointer-events: none;
  }

  .sq .chrome {
    position: absolute; top: 22px; left: 28px; right: 28px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 10.5px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.16em;
    color: var(--lcg-ink-60);
    z-index: 5;
  }
  .sq .chrome .dot {
    width: 6px; height: 6px; border-radius: 999px; background: var(--lcg-green);
    display: inline-block; margin-right: 8px;
  }
  .sq .foot {
    position: absolute; left: 28px; right: 28px; bottom: 18px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.16em;
    color: var(--lcg-ink-40);
    z-index: 5;
  }

  .sq .body {
    position: absolute; inset: 0;
    padding: 14% 8% 16%;
    display: flex; flex-direction: column; justify-content: space-between;
    z-index: 3;
  }
  .sq .eyebrow {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.2em; color: var(--lcg-green);
  }
  .sq .title {
    font-family: 'Fraunces', serif; font-weight: 300;
    font-size: clamp(54px, 13vw, 88px);
    line-height: 0.92; letter-spacing: -0.035em;
    color: var(--lcg-dark); margin: 14px 0 0;
  }
  .sq .title em { font-style: italic; color: var(--lcg-green); font-weight: 300; }
  .sq .phrase {
    margin-top: 22px;
    font-family: 'Fraunces', serif; font-weight: 300;
    font-size: clamp(15px, 3.4vw, 22px);
    line-height: 1.35; letter-spacing: -0.01em;
    color: var(--lcg-ink);
    max-width: 78%;
    font-style: italic;
  }
  .sq .counter {
    position: absolute; right: 8%; bottom: 14%;
    font-family: 'Fraunces', serif; font-weight: 200; font-style: italic;
    font-size: clamp(120px, 28vw, 180px);
    line-height: 0.8; letter-spacing: -0.04em;
    color: rgba(8,94,84,0.08);
    z-index: 2;
  }
  .sq .ticker {
    position: absolute; left: 8%; right: 8%; bottom: 11%;
    height: 1px; background: var(--lcg-line); z-index: 3;
  }
  .sq .ticker::before {
    content: ""; position: absolute; left: 0; top: 0; height: 100%;
    width: var(--prog, 0%);
    background: var(--lcg-green);
    transition: width 200ms linear;
  }

  .xfade {
    transition: opacity 380ms ease, transform 620ms cubic-bezier(.22,1,.36,1);
  }

  .ctrls {
    display: flex; align-items: center; justify-content: space-between;
    gap: 14px; width: 100%;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.14em; color: var(--lcg-ink-60);
  }
  .ctrls button {
    all: unset; cursor: pointer;
    padding: 7px 13px; border: 1px solid var(--lcg-line); border-radius: 999px;
    color: var(--lcg-dark); font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
    transition: background 180ms ease, color 180ms ease;
  }
  .ctrls button:hover { background: var(--lcg-dark); color: var(--lcg-cream); }
  .ctrls .t { font-variant-numeric: tabular-nums; cursor: pointer; }
</style>
</head>
<body>

<div class="wrap">
  <div class="label">
    <span>Valores y Comportamientos · LCG</span>
    <span class="bar"></span>
    <span id="t-label">01 / 07</span>
  </div>

  <div class="sq" id="card">
    <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
    <div class="bg"></div>
    <div class="chrome">
      <span><span class="dot"></span>London · Valores</span>
      <span id="rom">I / VII</span>
    </div>
    <div class="body">
      <div>
        <div class="eyebrow" id="tag">Eje · Ética</div>
        <h2 class="title xfade" id="title">Integridad<em>.</em></h2>
        <div class="phrase xfade" id="phrase">"Hacer lo correcto, incluso cuando nadie observa."</div>
      </div>
    </div>
    <div class="counter xfade" id="num">01</div>
    <div class="ticker" id="ticker"></div>
    <div class="foot">
      <span>Principio LCG</span><span>Auto · 4.5s</span>
    </div>
  </div>

  <div class="ctrls">
    <button id="btn-prev">← Anterior</button>
    <span class="t" id="btn-play">⏸ Pausar</span>
    <button id="btn-next">Siguiente →</button>
  </div>
</div>

<script>
  const VALUES = [
    { name: 'Integridad',  em: '.',                 tag: 'Eje · Ética',       phrase: 'Hacer lo correcto, incluso cuando nadie observa.' },
    { name: 'Compromiso',  em: '.',                 tag: 'Eje · Entrega',     phrase: 'Apropiarse del resultado, no solo de la tarea.' },
    { name: 'Pasión',      em: '.',                 tag: 'Eje · Energía',     phrase: 'Poner el corazón en cada entrega.' },
    { name: 'Innovación',  em: '.',                 tag: 'Eje · Creatividad', phrase: 'Retar el status quo con datos y criterio.' },
    { name: 'Orientación', em: ' al cliente.',      tag: 'Eje · Servicio',    phrase: 'Escuchar antes de proponer.' },
    { name: 'Respeto',     em: ' por el individuo.',tag: 'Eje · Personas',    phrase: 'Ver al otro de verdad.' },
    { name: 'Bienestar',   em: ' integral.',        tag: 'Eje · Balance',     phrase: 'Sostener la jornada larga.' },
  ];
  const ROM = ['I','II','III','IV','V','VI','VII'];
  const STEP = 4500;

  const $ = (id) => document.getElementById(id);
  let idx = 0;
  let playing = true;
  let timer = null;
  let tickerTimer = null;

  function xfade(el, newHTML) {
    el.style.transition = 'opacity 260ms ease, transform 520ms cubic-bezier(.22,1,.36,1)';
    el.style.opacity = '0';
    el.style.transform = 'translateY(-8px)';
    setTimeout(() => {
      el.innerHTML = newHTML;
      el.style.transition = 'none';
      el.style.opacity = '0';
      el.style.transform = 'translateY(10px)';
      void el.offsetWidth;
      el.style.transition = 'opacity 420ms ease, transform 620ms cubic-bezier(.22,1,.36,1)';
      el.style.opacity = '1';
      el.style.transform = 'translateY(0)';
    }, 220);
  }

  function animTicker() {
    const el = $('ticker');
    el.style.setProperty('--prog', '0%');
    const start = performance.now();
    clearInterval(tickerTimer);
    tickerTimer = setInterval(() => {
      const elapsed = performance.now() - start;
      const p = Math.min(100, (elapsed / STEP) * 100);
      el.style.setProperty('--prog', p + '%');
      if (p >= 100) clearInterval(tickerTimer);
    }, 50);
  }

  function render(i) {
    idx = ((i % VALUES.length) + VALUES.length) % VALUES.length;
    const v = VALUES[idx];
    $('tag').textContent = v.tag;
    $('rom').textContent = ROM[idx] + ' / VII';
    xfade($('title'), v.name + '<em>' + v.em + '</em>');
    xfade($('phrase'), '"' + v.phrase + '"');
    xfade($('num'), String(idx+1).padStart(2,'0'));
    $('t-label').textContent = String(idx+1).padStart(2,'0') + ' / 07';
    animTicker();
  }

  function start() { clearInterval(timer); timer = setInterval(() => render(idx + 1), STEP); }
  function stop()  { clearInterval(timer); timer = null; clearInterval(tickerTimer); }

  $('btn-prev').addEventListener('click', () => { render(idx - 1); if (playing) start(); });
  $('btn-next').addEventListener('click', () => { render(idx + 1); if (playing) start(); });
  $('btn-play').addEventListener('click', () => {
    playing = !playing;
    $('btn-play').textContent = playing ? '⏸ Pausar' : '▶ Reanudar';
    if (playing) start(); else stop();
  });

  render(0); start();
</script>

</body>
</html>
